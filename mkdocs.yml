site_name: leash-secrets
site_url: https://fasterapiweb.github.io/leash-secrets
site_description: >-
  Keep your secrets on a leash — AI agent skill that catches exposed
  API keys, tokens, and credentials before they hit your codebase.
site_author: EshwarCVS (FasterApiWeb)
repo_url: https://github.com/FasterApiWeb/leash-secrets
repo_name: FasterApiWeb/leash-secrets
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 EshwarCVS &amp; FasterApiWeb — MIT License

theme:
  name: material
  logo: assets/leash-secrets-logo.png
  favicon: assets/leash-secrets-logo.png

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FasterApiWeb/leash-secrets
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - How It Works: getting-started/how-it-works.md
  - Guide:
      - Commands: guide/commands.md
      - Modes: guide/modes.md
      - Agent Portability: guide/agent-portability.md
  - Patterns:
      - Overview: patterns/overview.md
      - Custom Patterns: patterns/custom-patterns.md
      - Pattern Reference: patterns/reference.md
  - Contributing:
      - How to Contribute: contributing/index.md
      - Adding Patterns: contributing/adding-patterns.md
      - Development Setup: contributing/development.md
  - Reference:
      - Benchmarks: reference/benchmarks.md
      - Security: reference/security.md
      - Changelog: reference/changelog.md
      - FAQ: reference/faq.md
