name: False Positive Report
description: Report a value that leash incorrectly flags as a secret
title: "[false-positive] "
labels: ["false-positive", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Help us reduce false positives! Do NOT include real secrets in this report.

  - type: input
    id: pattern-id
    attributes:
      label: Pattern ID
      description: Which pattern triggered the false positive?
      placeholder: e.g., generic-password-assignment
    validations:
      required: true

  - type: textarea
    id: trigger
    attributes:
      label: What Triggered It
      description: The (redacted) code that was incorrectly flagged. Do NOT include real secrets.
      render: text
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this not a real secret?
      placeholder: e.g., "This is a password validation regex, not a hardcoded password"
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Fix
      description: How should the pattern be refined to avoid this?
