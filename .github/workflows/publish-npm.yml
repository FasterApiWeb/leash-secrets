name: Publish npm

on:
  workflow_dispatch:
  # Fires when a *draft* release is published in the GitHub UI
  # (Release Draft workflow creates drafts; publishing them ships npm).
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only publish for our release tags (ignore other release events)
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'leash-secrets-v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate before publish
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
