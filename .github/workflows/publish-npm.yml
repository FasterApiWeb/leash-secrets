name: Publish npm

on:
  workflow_dispatch:
  # Fires when a *draft* release is published in the GitHub UI
  # (Release Draft workflow creates drafts; publishing them ships npm).
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only publish for our release tags (ignore other release events)
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'leash-secrets-v')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate before publish
        run: npm test

      - name: Skip if version already on npm
        id: gate
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if npm view "leash-secrets@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::leash-secrets@${VERSION} is already on npm — nothing to publish."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            echo "Will publish leash-secrets@${VERSION}"
          fi

      - name: Publish to npm
        if: steps.gate.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
