name: Validate Patterns

on:
  push:
    branches: [main]
    paths:
      - 'patterns/**'
      - 'tests/**'
      - 'scripts/check-patterns.js'
  pull_request:
    branches: [main]
    paths:
      - 'patterns/**'
      - 'tests/**'
      - 'scripts/check-patterns.js'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate pattern files
        run: node scripts/check-patterns.js

      - name: Run pattern tests
        run: node tests/test-patterns.js
