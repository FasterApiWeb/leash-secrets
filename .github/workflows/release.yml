name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate before publish
        run: |
          node scripts/check-patterns.js
          node tests/test-patterns.js

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-release-assets:
    name: Upload Release Assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skill files
        run: |
          tar -czf leash-skills-${{ needs.release-please.outputs.version }}.tar.gz \
            skills/ patterns/ hooks/ AGENTS.md .cursor/rules/leash.mdc .github/copilot-instructions.md
          zip -r leash-skills-${{ needs.release-please.outputs.version }}.zip \
            skills/ patterns/ hooks/ AGENTS.md .cursor/rules/leash.mdc .github/copilot-instructions.md

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            leash-skills-${{ needs.release-please.outputs.version }}.tar.gz \
            leash-skills-${{ needs.release-please.outputs.version }}.zip
