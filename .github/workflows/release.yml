name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release-please:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      # FasterApiWeb org blocks GITHUB_TOKEN from opening PRs. Release PRs are
      # prepared locally (scripts/prepare-release.sh). CI only tags/releases
      # when a labeled release PR is merged to main.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          skip-github-pull-request: true

      - name: Delete orphan release-please branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release-please--branches--main--components--leash-secrets"
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "No ${BRANCH} branch — nothing to clean up"
            exit 0
          fi
          OPEN=$(gh pr list --repo "${GITHUB_REPOSITORY}" --head "${BRANCH}" --state open --json number -q 'length')
          if [ "${OPEN}" != "0" ]; then
            echo "Open release PR exists — keeping ${BRANCH}"
            exit 0
          fi
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}"
          echo "Deleted orphan ${BRANCH} (no open release PR)"

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate before publish
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  upload-assets:
    name: Upload Release Assets
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package skill files
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          tar -czf leash-secrets-${VERSION}.tar.gz \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE
          zip -r leash-secrets-${VERSION}.zip \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            leash-secrets-${VERSION}.tar.gz \
            leash-secrets-${VERSION}.zip
