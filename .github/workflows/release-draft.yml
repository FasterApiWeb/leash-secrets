# Manual semver release (same pattern as FasterApiWeb/fork-shepherd).
# Actions → Release Draft → Run workflow → pick branch + patch|minor|major
# → bumps version files if needed, pushes commit, creates a *draft* GitHub Release.
# Publish the draft in the UI to ship (triggers Publish npm).
#
# Tag format: leash-secrets-vX.Y.Z

name: Release Draft

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to release from"
        required: true
        type: string
        default: main
      bump:
        description: "Semver bump from the latest leash-secrets-vX.Y.Z tag"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Compute next version only (do not commit, tag, or release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Tag & Draft Release
    runs-on: ubuntu-latest
    env:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      RELEASE_APP_INSTALLATION_ID: ${{ secrets.RELEASE_APP_INSTALLATION_ID }}
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Create GitHub App token
        id: app-token
        if: env.RELEASE_APP_ID != '' && env.RELEASE_APP_PRIVATE_KEY != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RELEASE_APP_ID }}
          private-key: ${{ env.RELEASE_APP_PRIVATE_KEY }}
          installation-id: ${{ env.RELEASE_APP_INSTALLATION_ID }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Resolve release token
        id: auth
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ env.RELEASE_TOKEN }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -n "${APP_TOKEN}" ]]; then
            echo "Using GitHub App installation token"
            echo "::add-mask::${APP_TOKEN}"
            echo "token=${APP_TOKEN}" >> "${GITHUB_OUTPUT}"
            echo "source=app" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${PAT_TOKEN}" ]]; then
            echo "Using RELEASE_TOKEN PAT"
            echo "::add-mask::${PAT_TOKEN}"
            echo "token=${PAT_TOKEN}" >> "${GITHUB_OUTPUT}"
            echo "source=pat" >> "${GITHUB_OUTPUT}"
          else
            echo "Using GITHUB_TOKEN"
            echo "::add-mask::${FALLBACK_TOKEN}"
            echo "token=${FALLBACK_TOKEN}" >> "${GITHUB_OUTPUT}"
            echo "source=github" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          token: ${{ steps.auth.outputs.token }}

      - name: Resolve version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          SOURCE_LABEL: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          git fetch origin --tags --force
          if git rev-parse --verify "origin/${SOURCE_LABEL}" >/dev/null 2>&1; then
            git checkout -B "${SOURCE_LABEL}" "origin/${SOURCE_LABEL}"
          elif git rev-parse --verify "${SOURCE_LABEL}" >/dev/null 2>&1; then
            git checkout --detach "${SOURCE_LABEL}"
          else
            echo "::error::Unknown branch/ref: ${SOURCE_LABEL}"
            exit 1
          fi

          pkg="$(node -p "require('./package.json').version")"
          latest="$(git tag -l 'leash-secrets-v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${latest}" ]]; then
            latest="leash-secrets-v0.0.0"
          fi

          ver="${latest#leash-secrets-v}"
          IFS='.' read -r major minor patch <<< "${ver}"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          case "${BUMP}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "::error::Unknown bump: ${BUMP}"; exit 1 ;;
          esac

          next="${major}.${minor}.${patch}"
          tag="leash-secrets-v${next}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists"
            exit 1
          fi

          if [[ "${pkg}" == "${next}" ]]; then
            need_bump=false
          else
            need_bump=true
          fi

          {
            echo "tag=${tag}"
            echo "version=${next}"
            echo "latest=${latest}"
            echo "bump=${BUMP}"
            echo "branch=${SOURCE_LABEL}"
            echo "pkg_before=${pkg}"
            echo "need_bump=${need_bump}"
          } >> "${GITHUB_OUTPUT}"

          echo "Next ${tag} (from ${latest}, bump=${BUMP}); package.json is ${pkg}; need_bump=${need_bump}"

      - name: Bump version files
        id: bump
        if: steps.version.outputs.need_bump == 'true' && inputs.dry_run != true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
          AUTH_SOURCE: ${{ steps.auth.outputs.source }}
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          TODAY="$(date -u +%Y-%m-%d)"

          node <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          for (const file of ['package.json', 'vscode-extension/package.json']) {
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
          }
          fs.writeFileSync('.release-please-manifest.json', JSON.stringify({ '.': version }, null, 2) + '\n');
          NODE

          # install.sh VERSION=
          sed -i "s/^VERSION=\"[^\"]*\"/VERSION=\"${VERSION}\"/" scripts/install.sh

          # CITATION.cff
          sed -i "s/^version: .*/version: ${VERSION}/" CITATION.cff
          sed -i "s/^date-released: .*/date-released: \"${TODAY}\"/" CITATION.cff

          # CHANGELOG — insert section after title block if missing
          PREV="${{ steps.version.outputs.latest }}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            tmp="$(mktemp)"
            {
              head -n 7 CHANGELOG.md
              echo ""
              echo "## [${VERSION}](https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...leash-secrets-v${VERSION}) (${TODAY})"
              echo ""
              echo "### Maintenance"
              echo ""
              echo "* release ${VERSION}"
              echo ""
              tail -n +8 CHANGELOG.md
            } > "${tmp}"
            mv "${tmp}" CHANGELOG.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json vscode-extension/package.json .release-please-manifest.json \
            scripts/install.sh CITATION.cff CHANGELOG.md
          git commit -m "chore: release ${VERSION}"

          SHA="$(git rev-parse HEAD)"
          REL_BRANCH="release/v${VERSION}"

          # Prefer pushing the bump straight to the target branch (needs bypass / RELEASE_TOKEN).
          if git push origin "HEAD:${BRANCH}"; then
            echo "Pushed chore: release ${VERSION} to ${BRANCH} @ ${SHA:0:7} (${AUTH_SOURCE})"
          else
            echo "::warning::Direct push to ${BRANCH} blocked (${AUTH_SOURCE}). Pushing ${REL_BRANCH} instead."
            git push -u origin "HEAD:refs/heads/${REL_BRANCH}"

            # Best-effort: open + squash-merge PR so main gets the bump.
            if gh pr create --repo "${GITHUB_REPOSITORY}" --base "${BRANCH}" --head "${REL_BRANCH}" \
              --title "chore: release ${VERSION}" \
              --body "Automated version bump from Release Draft workflow." 2>/tmp/pr-create.err; then
              PR_URL="$(gh pr view --repo "${GITHUB_REPOSITORY}" --head "${REL_BRANCH}" --json url -q .url)"
              echo "Opened ${PR_URL}"
              if gh pr merge --repo "${GITHUB_REPOSITORY}" "${REL_BRANCH}" --squash --admin 2>/tmp/pr-merge.err; then
                echo "Merged release bump into ${BRANCH}"
                git fetch origin "${BRANCH}"
                SHA="$(git rev-parse "origin/${BRANCH}")"
              else
                echo "::warning::Could not auto-merge release PR. Merge ${REL_BRANCH} into ${BRANCH} manually, then publish the draft."
                cat /tmp/pr-merge.err || true
              fi
            else
              echo "::warning::Could not open release PR (org may block Actions PRs). Branch ${REL_BRANCH} has the bump; draft release still uses this commit."
              cat /tmp/pr-create.err || true
            fi
          fi

          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"
          echo "Release commit ${SHA:0:7} ready for draft tag"

      - name: Use existing HEAD when no bump needed
        id: nobump
        if: steps.version.outputs.need_bump != 'true' || inputs.dry_run == true
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Package release assets
        if: inputs.dry_run != true
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tar -czf "leash-secrets-${VERSION}.tar.gz" \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE
          zip -r "leash-secrets-${VERSION}.zip" \
            skills/ patterns/ hooks/ src/ bin/ \
            AGENTS.md .cursor/rules/leash-secrets.mdc .github/copilot-instructions.md \
            package.json README.md LICENSE

      - name: Create GitHub Release (draft)
        if: inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: leash-secrets v${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.bump.outputs.sha || steps.nobump.outputs.sha }}
          draft: true
          generate_release_notes: true
          files: |
            leash-secrets-${{ steps.version.outputs.version }}.tar.gz
            leash-secrets-${{ steps.version.outputs.version }}.zip
          token: ${{ steps.auth.outputs.token }}

      - name: Summary
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::notice::Dry run — would draft ${{ steps.version.outputs.tag }} (package.json ${{ steps.version.outputs.pkg_before }} → ${{ steps.version.outputs.version }}, need_bump=${{ steps.version.outputs.need_bump }})"
          else
            echo "::notice::Draft ${{ steps.version.outputs.tag }} created. Open Releases → Publish to ship (triggers npm)."
          fi
